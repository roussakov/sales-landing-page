<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="only light">
  <title>מכירת תכולת דירה — הכל חייב ללכת! 🏠</title>
  <meta name="description" content="אנחנו משפצים את הבית וכל הפריטים המקסימים שלנו מחפשים בית חדש. בואו לאמץ!">
  <meta property="og:title" content="מכירת תכולת דירה — הכל חייב ללכת! 🏠✨">
  <meta property="og:description" content="ריהוט, מוצרי חשמל ועוד המון דברים טובים במחירים מעולים. לוקחים הכל? מחיר מיוחד!">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=4">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
</head>
<body>
  <header class="hero">
    <div class="hero-badge" id="hero-badge"></div>
    <h1 id="page-title"></h1>
    <p class="subtitle" id="page-subtitle"></p>
    <p class="pickup-info" id="pickup-info"></p>
  </header>

  <main class="container">
    <section class="toolbar">
      <div class="chips" id="chips" role="tablist" aria-label="סינון לפי קטגוריה"></div>
      <div class="search-wrap">
        <input type="search" id="search" placeholder="🔍 מחפשים משהו מסוים?" aria-label="חיפוש פריט">
      </div>
    </section>

    <p class="sold-counter" id="sold-counter"></p>

    <section class="grid" id="grid" aria-live="polite"></section>

    <p class="empty-state" id="empty-state" hidden>לא מצאנו כלום 🙈 נסו לחפש משהו אחר</p>
  </main>

  <footer class="footer">
    <p>העמוד מתעדכן כל הזמן — שווה לחזור ולהציץ 👀</p>
    <p class="footer-heart">נבנה באהבה לקראת פרק חדש 🧡</p>
  </footer>

  <a class="wa-float" id="wa-float" target="_blank" rel="noopener" aria-label="שאלה כללית בוואטסאפ">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2zm0 1.8a8.2 8.2 0 1 1-4.2 15.3l-.3-.2-3 .8.8-2.9-.2-.3A8.2 8.2 0 0 1 12 3.8zm-3.1 4c-.2 0-.5 0-.7.3-.2.3-.9.9-.9 2.1s.9 2.4 1 2.6c.1.2 1.8 2.8 4.3 3.9 2.1.9 2.6.7 3 .7.5 0 1.5-.6 1.7-1.2.2-.6.2-1.1.2-1.2l-.4-.2-1.5-.7c-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1-.2-.1-.9-.3-1.8-1.1-.7-.6-1.1-1.3-1.2-1.5-.1-.2 0-.3.1-.5l.4-.5c.1-.2.1-.3.2-.4v-.4L10 8.2c-.2-.4-.4-.4-.6-.4h-.5z"/></svg>
  </a>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightbox-close" aria-label="סגירה">✕</button>
    <img id="lightbox-img" alt="">
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
